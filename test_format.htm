<!DOCTYPE html>
<html>
<body>
  <input type="datetime-local" id="dt" value="">
  <script>
    const el = document.getElementById('dt');
    // Simulate what the React state receives from backend:
    el.value = "2026-03-01T20:30:00".slice(0, 16);
    console.log("Initial slice test:", el.value);

    // See what happens if it has 'Z'
    try {
        el.value = "2026-03-01T20:30:00Z".slice(0, 16);
        console.log("With Z slice test:", el.value);
    } catch (e) { console.log(e); }
  </script>
</body>
</html>
