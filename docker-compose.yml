services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Riyadh
    volumes:
      - db_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TZ: Asia/Riyadh
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_data_dev:/app/app/static
      - backup_data_dev:/app/backups

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8548:80"
    depends_on:
      - backend

volumes:
  db_data_dev:
  static_data_dev:
  backup_data_dev:
