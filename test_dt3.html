<!DOCTYPE html>
<html>
<body>
<input type="datetime-local" id="dt1" value="">
<input type="datetime-local" id="dt2" value="">
<script>
    // Valid format for datetime-local is YYYY-MM-DDThh:mm
    document.getElementById('dt1').value = "2026-03-01T20:30";
    console.log("dt1 after valid:", document.getElementById('dt1').value);

    // If it has Z it might be rejected by the browser
    document.getElementById('dt2').value = "2026-03-01T20:30Z";
    console.log("dt2 after invalid Z:", document.getElementById('dt2').value);

    // If it has seconds it might be rejected depending on step attribute, but usually okay
    document.getElementById('dt1').value = "2026-03-01T20:30:00";
    console.log("dt1 after seconds:", document.getElementById('dt1').value);
</script>
</body>
</html>
